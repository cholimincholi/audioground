model:
  model_type: "audioground"

  llama_path: "/dev/shm/audioground_models/salmonn-7b-llama-merged"
  whisper_path: "/dev/shm/audioground_models/whisper-large-v3"
  beats_path: "/dev/shm/audioground_models/BEATs_iter3_plus_AS2M_finetuned_on_AS2M_cpt2.pt"
  ckpt: "/home/irteam/avqa2/SALMONN/ckpts/salmonn_7b_v0.pth"

  freeze_whisper: True
  freeze_beats: True

  # window-level Q-Former (paper settings)
  use_speech_Qformer: True
  freeze_speech_QFormer: False
  window_level_Qformer: True
  num_speech_query_token: 1
  second_per_window: 0.333333
  second_stride: 0.333333

  speech_llama_proj_model: ""
  freeze_speech_llama_proj: False

  # LoRA (paper: rank=32, alpha=64)
  lora: True
  lora_rank: 32
  lora_alpha: 64
  lora_dropout: 0.1

  multi_prompt: True
  prompt_template: "USER: {}\nASSISTANT:"
  prompt_path: "prompts/train_prompt.json"
  max_txt_len: 300
  end_sym: "</s>"

  # ── AudioGround temporal components ───────────────────────────────────────
  # Toggle each independently for ablation (Table 4)
  use_frame_interpolation: True      # FI
  use_timestamp_conditioning: True   # TS
  use_absolute_time_embedding: True  # ATE
  ate_type: "hybrid"                 # "sinusoidal" | "learned" | "hybrid"
  ate_beta_init: 0.05

datasets:
  train_ann_path: "/home/irteam/avqa2/SALMONN/data/audioground_it_train_split.json"
  valid_ann_path: "/home/irteam/avqa2/SALMONN/data/audioground_it_valid.json"
  test_ann_path:  "/home/irteam/avqa2/SALMONN/data/audioground_it_valid.json"
  whisper_path: "/dev/shm/audioground_models/whisper-large-v3"

run:
  seed: 42
  output_dir: "output/audioground"
  evaluate: False

  log_freq: 5
  epoch_based: False
  iters_per_epoch: 6000   # paper: 6K steps total
  accum_grad_iters: 3     # effective batch 24: 2 × 4 GPU × 3 accum
  batch_size_train: 2     # reduced for 120s audio (4 chunks, 2x memory)
  batch_size_eval: 2
  num_workers: 4

  device: "cuda"
  use_distributed: True
  amp: True
  world_size: 4
  dist_url: "env://"

  optims:
    max_epoch: 1
    warmup_steps: 100
    warmup_start_lr: 1e-6
    init_lr: 3e-5
    min_lr: 1e-5
    weight_decay: 0.05
    beta2: 0.999
